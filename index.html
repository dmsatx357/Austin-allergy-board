<!DOCTYPE html>
<html>
<head>
  <title>Austin Allergy Board</title>
</head>
<body>
  <h1>Austin Allergy Board</h1>
  <pre id="output">Loading...</pre>

  <script>
    fetch('/api/allergy')
      .then(res => res.json())
      .then(data => {
        document.getElementById('output').textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('output').textContent = err.message;
      });
  </script>
</body>
</html>
