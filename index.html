<!DOCTYPE html>
<html>
<head>
  <title>Austin Allergy Board</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f4f1ea;
      color: #1f1f1f;
      padding: 40px;
    }
    .page { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 42px; line-height: 1.05; border-bottom: 3px solid #111; padding-bottom: 18px; }
    table { width: 100%; border-collapse: collapse; background: #fbfaf7; margin-top: 24px; }
    th, td { border-bottom: 1px solid #c9c2b8; padding: 12px; text-align: left; font-family: Arial, sans-serif; font-size: 14px; }
    th { border-bottom: 2px solid #111; text-transform: uppercase; font-size: 11px; }
  </style>
</head>
<body>
  <div class="page">
    <h1 id="headline">Loading allergy report...</h1>
    <p id="summary"></p>

    <table>
      <thead>
        <tr>
          <th>Source</th>
          <th>Method</th>
          <th>Tree</th>
          <th>Grass</th>
          <th>Weed</th>
          <th>Mold</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    fetch('/api/allergy')
      .then(res => res.json())
      .then(data => {
        document.getElementById('headline').textContent = data.summary.headline;
        document.getElementById('summary').textContent =
          `Consensus: ${data.summary.consensus} · Agreement: ${data.summary.agreement} · Most disputed: ${data.summary.mostDisputed}`;

        document.getElementById('rows').innerHTML = data.sources.map(s => `
          <tr>
            <td><strong>${s.name}</strong></td>
            <td>${s.method}</td>
            <td>${s.tree}</td>
            <td>${s.grass}</td>
            <td>${s.weed}</td>
            <td>${s.mold}</td>
            <td>${s.status}</td>
          </tr>
        `).join('');
      });
  </script>
</body>
</html>
